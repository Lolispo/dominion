# Auto-deploys Dominion to dominion.petterbuilds.com on push to main.
#
# Dominion is a static HTML/JS game with no bundler. `npm run build` just stages
# the runtime files into dist/ (see scripts/build-static.sh); the shared platform
# workflow then injects the RUM snippet, syncs dist/ to the apps bucket under
# /dominion/, and invalidates CloudFront.
#
# This repo is PUBLIC, so it calls the shared deploy workflow in the PUBLIC repo
# Lolispo/ci directly (GitHub blocks public→private reusable-workflow calls, so it
# can't go through the private web-platform like the private apps do). The AWS
# role ARN is passed as the repo SECRET AWS_DEPLOY_ROLE_ARN, so GitHub masks it in
# these public run logs (keeping the account id out of both source and logs).
# Access is gated by the OIDC trust policy (repo:Lolispo/*), not by secrecy.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: Lolispo/ci/.github/workflows/deploy-app.yml@main
    with:
      app-id: dominion
      # No dependencies — the build is pure bash. npm ci just satisfies the
      # workflow's setup-node cache + install step against the empty lockfile.
      install-command: npm ci
      build-command: npm run build
    secrets:
      role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
